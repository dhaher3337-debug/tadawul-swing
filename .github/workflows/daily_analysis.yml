name: Daily Analysis V9.2.1

# ═══════════════════════════════════════════════════════════════════
# 🌐 V9.2.1 - تحسينات بناءً على مشكلة 4 مايو 2026:
#    1. حذف cache restore (كان يستعيد بيانات قديمة)
#    2. data freshness check قبل توليد التقرير
#
# التشغيل من cron-job.org يستمر بنفس الإعداد القديم
# ═══════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
  
  repository_dispatch:
    types: [daily-run, weekly-run]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # cache فقط لـ pip packages (آمن)

      # ═══════════════════════════════════════════════════════════════════
      # 🔴 ملاحظة V9.2.1: حذفنا cache لـ tadawul_data/
      # السبب: cache كان يستعيد بيانات قديمة وتسبب في تقارير وهمية
      # 
      # البيانات تُحفظ عبر git commit بدلاً من cache
      # ═══════════════════════════════════════════════════════════════════

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import xgboost; print(f'✅ xgboost {xgboost.__version__}')"
          python -c "import sklearn; print(f'✅ sklearn {sklearn.__version__}')"
          python -c "import openpyxl; print(f'✅ openpyxl {openpyxl.__version__}')"

      - name: Run scanner + paper trading + knowledge capture
        run: python run_all.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUNBUFFERED: '1'

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add weights_history/ tadawul_data/ paper_trades/ -f 2>/dev/null || true
          git diff --staged --quiet || git commit -m "📊 V9.2.1 daily run $(date -u +%Y-%m-%d_%H:%M)"
          git push || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
