name: Smart Stock Scanner V8

on:
  workflow_dispatch:
  # الجدولة عبر cron-job.org الخارجي (أدق في التوقيت)
  # GitHub schedule معطّل لتجنب التضارب

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: tadawul_data/
          key: tadawul-v8-${{ github.run_id }}
          restore-keys: tadawul-v8-

      - name: Install dependencies
        run: pip install yfinance pandas numpy anthropic

      - name: Run scanner
        run: python run_all.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUNBUFFERED: '1'

      - name: Save data cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: tadawul_data/
          key: tadawul-v8-${{ github.run_id }}

      - name: Commit weights history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weights_history/ tadawul_data/ -f 2>/dev/null || true
          git diff --staged --quiet || git commit -m "📊 تحديث الأوزان $(date +%Y-%m-%d)"
          git push || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
