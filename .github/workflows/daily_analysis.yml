name: Daily Analysis V9.2

# ═══════════════════════════════════════════════════════════════════
# 🌐 التشغيل الفعلي يتم من cron-job.org (موقع خارجي)
#
# ✅ الإعداد الحالي في cron-job.org يعمل بدون أي تغيير:
#    URL: https://api.github.com/repos/{owner}/{repo}/actions/workflows/daily_analysis.yml/dispatches
#    Method: POST
#    Body: {"ref": "main"}
#
# نحتفظ بـ workflow_dispatch (متوافق مع cron-job.org الحالي)
# ونضيف repository_dispatch (خيار بديل لو احتجت لاحقاً)
# ═══════════════════════════════════════════════════════════════════

on:
  # الطريقة الحالية المستخدمة من cron-job.org ✅
  workflow_dispatch:
  
  # طريقة بديلة (اختيارية) - لو أردت تغيير cron-job.org لاحقاً
  repository_dispatch:
    types: [daily-run, weekly-run]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: |
            tadawul_data/
            paper_trades/
          key: tadawul-v92-${{ github.run_id }}
          restore-keys: tadawul-v92-

      # ═══════════════════════════════════════════════════════════════════
      # 🔴 الإصلاح الحرج: استخدام requirements.txt
      # ═══════════════════════════════════════════════════════════════════
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import xgboost; print(f'✅ xgboost {xgboost.__version__}')"
          python -c "import sklearn; print(f'✅ sklearn {sklearn.__version__}')"
          python -c "import openpyxl; print(f'✅ openpyxl {openpyxl.__version__}')"

      - name: Run scanner + paper trading + knowledge capture
        run: python run_all.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUNBUFFERED: '1'

      - name: Save data cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            tadawul_data/
            paper_trades/
          key: tadawul-v92-${{ github.run_id }}

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weights_history/ tadawul_data/ paper_trades/ -f 2>/dev/null || true
          git diff --staged --quiet || git commit -m "📊 V9.2 daily run $(date -u +%Y-%m-%d)"
          git push || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
