name: Weekly Report V9.2

# ═══════════════════════════════════════════════════════════════════
# 📊 التقرير الأسبوعي - مستقل عن التحليل اليومي
#
# يُستدعى من cron-job.org يوم الجمعة فجراً (بعد إغلاق الأسبوع)
#
# الإعداد في cron-job.org:
#    URL: https://api.github.com/repos/{owner}/{repo}/actions/workflows/weekly_report.yml/dispatches
#    Method: POST
#    Body: {"ref": "main"}
#    Schedule: الجمعة @ 02:00 UTC (5 ص سعودي)
#
# هذا التقرير:
#   ✅ يحلل أداء النظام نفسه (مش السوق)
#   ✅ Win Rate الأسبوعي
#   ✅ أداء حسب القطاع/نوع الإشارة
#   ✅ الأسهم المتعبة
#   ✅ نمو قاعدة المعرفة
#
# ⚠️ لا يحتاج Anthropic API - يستخدم بيانات محفوظة فقط
# ⚠️ لا يستهلك tokens - مجاني تماماً
# ═══════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
  
  repository_dispatch:
    types: [weekly-report]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # سريع - فقط قراءة و تحليل
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          # التقرير الأسبوعي يحتاج فقط Python standard library + (اختياري) openpyxl
          pip install openpyxl

      - name: Generate weekly report
        run: python weekly_report.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Commit weekly report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weekly_reports/ -f 2>/dev/null || true
          git diff --staged --quiet || git commit -m "📊 V9.2 weekly report $(date -u +%Y-%m-%d)"
          git push || true
